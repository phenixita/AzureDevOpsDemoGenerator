name: Release AzdoGenCli Single-File

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Publish single-file bundle
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish AzdoGenCli
        id: publish
        run: |
          set -euo pipefail
          rid=${{ matrix.rid }}
          version=${GITHUB_REF_NAME}
          publish_dir=publish/$rid
          mkdir -p "$publish_dir"
          dotnet publish src/AzdoGenCli/AzdoGenCli.csproj \
            -c Release \
            -r "$rid" \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=false \
            -p:PublishReadyToRun=false \
            -o "$publish_dir"
          artifact_name=AzdoGenCli-$version-$rid.tar.gz
          mkdir -p artifacts
          tar -czf artifacts/$artifact_name -C "$publish_dir" .
          echo "artifact=artifacts/$artifact_name" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.rid }}
          path: ${{ steps.publish.outputs.artifact }}

  release:
    name: Create tag release with assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download linux build
        uses: actions/download-artifact@v4
        with:
          name: publish-linux-x64
          path: artifacts
      - name: Download windows build
        uses: actions/download-artifact@v4
        with:
          name: publish-win-x64
          path: artifacts
      - name: Download macos x64 build
        uses: actions/download-artifact@v4
        with:
          name: publish-osx-x64
          path: artifacts
      - name: Download macos arm64 build
        uses: actions/download-artifact@v4
        with:
          name: publish-osx-arm64
          path: artifacts
      - name: Ensure all artifacts exist
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME}
          artifacts_dir=artifacts
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            path="$artifacts_dir/AzdoGenCli-$version-$rid.tar.gz"
            if [ ! -f "$path" ]; then
              echo "Missing artifact $path"
              exit 1
            fi
          done
      - name: Authenticate gh CLI
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token
      - name: Create or update release
        run: |
          set -euo pipefail
          tag=${GITHUB_REF_NAME}
          assets=(
            artifacts/AzdoGenCli-$tag-win-x64.tar.gz
            artifacts/AzdoGenCli-$tag-linux-x64.tar.gz
            artifacts/AzdoGenCli-$tag-osx-x64.tar.gz
            artifacts/AzdoGenCli-$tag-osx-arm64.tar.gz
          )
          gh release create "$tag" "${assets[@]}" \
            --title "AzdoGenCli $tag" \
            --notes "Self-contained single-file executables" \
            --target "$tag"
      - name: Verify release assets
        run: |
          set -euo pipefail
          tag=${GITHUB_REF_NAME}
          cleanup() {
            gh release delete "$tag" --yes || true
            git push origin --delete "$tag" || true
            exit 1
          }
          expected_count=4
          actual_count=$(gh release view "$tag" --json assets --jq '.assets | length')
          if [ "$actual_count" -ne "$expected_count" ]; then
            echo "Release has $actual_count assets, expected $expected_count"
            cleanup
          fi
          asset_names=$(gh release view "$tag" --json assets --jq '.assets[].name')
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            expected=AzdoGenCli-$tag-$rid.tar.gz
            if ! echo "$asset_names" | grep -Fxq "$expected"; then
              echo "Missing $expected in release assets"
              cleanup
            fi
          done
